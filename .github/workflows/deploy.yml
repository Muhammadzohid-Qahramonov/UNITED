name: Deploy Serverpod Backend

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          [ -n "$EC2_HOST" ] || (echo "EC2_HOST is missing" && exit 1)
          [ -n "$EC2_USER" ] || (echo "EC2_USER is missing" && exit 1)
          [ -n "$EC2_DEPLOY_PATH" ] || (echo "EC2_DEPLOY_PATH is missing" && exit 1)

          if [ -z "$EC2_SSH_PRIVATE_KEY" ] && [ -z "$EC2_SSH_PRIVATE_KEY_B64" ]; then
            echo "Set EC2_SSH_PRIVATE_KEY or EC2_SSH_PRIVATE_KEY_B64"
            exit 1
          fi

      - name: Prepare SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh

          if [ -n "$EC2_SSH_PRIVATE_KEY_B64" ]; then
            echo "$EC2_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/ec2_key
          else
            printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          fi

          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Static analysis
        run: dart analyze

      - name: Sync project to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_USE_SUDO: ${{ secrets.EC2_USE_SUDO }}
        run: |
          set -euo pipefail

          PORT="${EC2_PORT:-22}"
          SSH_CMD="ssh -i ~/.ssh/ec2_key -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          REMOTE_SUDO=""
          if [ "${EC2_USE_SUDO:-false}" = "true" ]; then
            REMOTE_SUDO="sudo"
          fi

          if ! $SSH_CMD "$EC2_USER@$EC2_HOST" "set -e; $REMOTE_SUDO mkdir -p '$EC2_DEPLOY_PATH'; $REMOTE_SUDO chown -R '$EC2_USER':'$EC2_USER' '$EC2_DEPLOY_PATH'"; then
            echo "Cannot create/write EC2_DEPLOY_PATH=$EC2_DEPLOY_PATH for user $EC2_USER"
            echo "Use a writable path like /home/$EC2_USER/united_server or set EC2_USE_SUDO=true"
            exit 1
          fi

          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.dart_tool/' \
            --exclude 'test/' \
            -e "$SSH_CMD" \
            ./ "$EC2_USER@$EC2_HOST:$EC2_DEPLOY_PATH/"

      - name: Restart backend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          SERVERPOD_PASSWORDS_YAML_B64: ${{ secrets.SERVERPOD_PASSWORDS_YAML_B64 }}
          EC2_USE_SUDO: ${{ secrets.EC2_USE_SUDO }}
        run: |
          set -euo pipefail

          PORT="${EC2_PORT:-22}"
          REMOTE_SUDO=""
          if [ "${EC2_USE_SUDO:-false}" = "true" ]; then
            REMOTE_SUDO="sudo"
          fi

          ssh -i ~/.ssh/ec2_key \
            -p "$PORT" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$EC2_USER@$EC2_HOST" \
            "EC2_DEPLOY_PATH='$EC2_DEPLOY_PATH' SERVERPOD_PASSWORDS_YAML_B64='$SERVERPOD_PASSWORDS_YAML_B64' REMOTE_SUDO='$REMOTE_SUDO' bash -se" <<'REMOTE'
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker command not found on EC2. Install Docker first."
            exit 1
          fi

          COMPOSE_CMD="docker compose"
          if ! docker compose version >/dev/null 2>&1; then
            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Docker Compose is not installed. Install docker-compose-plugin or docker-compose."
              exit 1
            fi
          fi

          cd "$EC2_DEPLOY_PATH"

          if [ -n "${SERVERPOD_PASSWORDS_YAML_B64:-}" ]; then
            mkdir -p config
            echo "$SERVERPOD_PASSWORDS_YAML_B64" | base64 -d > config/passwords.yaml
          fi

          if [ -n "${REMOTE_SUDO:-}" ]; then
            $REMOTE_SUDO bash -lc "$COMPOSE_CMD up -d --build"
            $REMOTE_SUDO docker image prune -f
          else
            bash -lc "$COMPOSE_CMD up -d --build"
            docker image prune -f
          fi
REMOTE

      - name: Cleanup temporary key
        if: always()
        run: rm -f ~/.ssh/ec2_key
