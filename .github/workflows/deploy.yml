name: Deploy Serverpod Backend

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          [ -n "$EC2_HOST" ] || (echo "EC2_HOST is missing" && exit 1)
          [ -n "$EC2_USER" ] || (echo "EC2_USER is missing" && exit 1)
          [ -n "$EC2_DEPLOY_PATH" ] || (echo "EC2_DEPLOY_PATH is missing" && exit 1)

          if [ -z "$EC2_SSH_PRIVATE_KEY" ] && [ -z "$EC2_SSH_PRIVATE_KEY_B64" ]; then
            echo "Set EC2_SSH_PRIVATE_KEY or EC2_SSH_PRIVATE_KEY_B64"
            exit 1
          fi

      - name: Prepare SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          if [ -n "$EC2_SSH_PRIVATE_KEY_B64" ]; then
            echo "$EC2_SSH_PRIVATE_KEY_B64" | base64 -d > .ec2_key
          else
            printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > .ec2_key
          fi

          chmod 600 .ec2_key
          ssh-keygen -y -f .ec2_key > /dev/null

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Static analysis
        run: dart analyze

      - name: Upload project to EC2 server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: .ec2_key
          port: ${{ secrets.EC2_PORT || 22 }}
          source: "./*"
          target: ${{ secrets.EC2_DEPLOY_PATH }}
          rm: false
          overwrite: true
          strip_components: 0
          timeout: 120s

      - name: Restart backend on EC2 server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: .ec2_key
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          timeout: 120s
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            if [ -n "${{ secrets.SERVERPOD_PASSWORDS_YAML_B64 }}" ]; then
              mkdir -p config
              echo "${{ secrets.SERVERPOD_PASSWORDS_YAML_B64 }}" | base64 -d > config/passwords.yaml
            fi

            docker compose up -d --build
            docker image prune -f

      - name: Cleanup temporary key
        if: always()
        run: rm -f .ec2_key
