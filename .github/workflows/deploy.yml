name: Deploy Serverpod Backend

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          [ -n "$EC2_HOST" ] || (echo "EC2_HOST is missing" && exit 1)
          [ -n "$EC2_USER" ] || (echo "EC2_USER is missing" && exit 1)
          [ -n "$EC2_DEPLOY_PATH" ] || (echo "EC2_DEPLOY_PATH is missing" && exit 1)

          if [ -z "$EC2_SSH_PRIVATE_KEY" ] && [ -z "$EC2_SSH_PRIVATE_KEY_B64" ]; then
            echo "Set EC2_SSH_PRIVATE_KEY or EC2_SSH_PRIVATE_KEY_B64"
            exit 1
          fi

      - name: Prepare SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_PRIVATE_KEY_B64: ${{ secrets.EC2_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          if [ -n "$EC2_SSH_PRIVATE_KEY_B64" ]; then
            echo "$EC2_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/ec2_key
          else
            printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          fi

          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key >/dev/null

      - name: Prepare optional passwords file
        env:
          SERVERPOD_PASSWORDS_YAML_B64: ${{ secrets.SERVERPOD_PASSWORDS_YAML_B64 }}
          SERVERPOD_PASSWORDS_YAML: ${{ secrets.SERVERPOD_PASSWORDS_YAML }}
        run: |
          set -euo pipefail

          if [ -n "${SERVERPOD_PASSWORDS_YAML_B64:-}" ]; then
            mkdir -p config
            if ! printf '%s' "$SERVERPOD_PASSWORDS_YAML_B64" | base64 -d > config/passwords.yaml 2>/dev/null; then
              echo "SERVERPOD_PASSWORDS_YAML_B64 is not valid base64"
              echo "Recreate with: base64 -i config/passwords.yaml | tr -d '\\n'"
              exit 1
            fi
          elif [ -n "${SERVERPOD_PASSWORDS_YAML:-}" ]; then
            mkdir -p config
            printf '%s' "$SERVERPOD_PASSWORDS_YAML" > config/passwords.yaml
          fi

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Static analysis
        run: dart analyze

      - name: Sync project to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_USE_SUDO: ${{ secrets.EC2_USE_SUDO }}
        run: |
          set -euo pipefail

          PORT="${EC2_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/ec2_key -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          REMOTE_SUDO=""
          if [ "${EC2_USE_SUDO:-false}" = "true" ]; then
            REMOTE_SUDO="sudo"
          fi

          ssh $SSH_OPTS "$EC2_USER@$EC2_HOST" "$REMOTE_SUDO mkdir -p '$EC2_DEPLOY_PATH' && $REMOTE_SUDO chown -R '$EC2_USER':'$EC2_USER' '$EC2_DEPLOY_PATH'"

          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.dart_tool/' \
            --exclude 'test/' \
            -e "ssh $SSH_OPTS" \
            ./ "$EC2_USER@$EC2_HOST:$EC2_DEPLOY_PATH/"

      - name: Restart backend on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
          EC2_USE_SUDO: ${{ secrets.EC2_USE_SUDO }}
        run: |
          set -euo pipefail

          PORT="${EC2_PORT:-22}"
          SSH_OPTS="-i ~/.ssh/ec2_key -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          REMOTE_SUDO=""
          if [ "${EC2_USE_SUDO:-false}" = "true" ]; then
            REMOTE_SUDO="sudo"
          fi

          ssh $SSH_OPTS "$EC2_USER@$EC2_HOST" "set -euo pipefail; if ! command -v docker >/dev/null 2>&1; then echo 'docker command not found on EC2'; exit 1; fi; COMPOSE_CMD='docker compose'; if ! docker compose version >/dev/null 2>&1; then if command -v docker-compose >/dev/null 2>&1; then COMPOSE_CMD='docker-compose'; else echo 'Docker Compose is not installed'; exit 1; fi; fi; cd '$EC2_DEPLOY_PATH'; if [ '$REMOTE_SUDO' = 'sudo' ]; then sudo bash -lc \"\$COMPOSE_CMD -f docker-compose.ec2.yml up -d --build\"; sudo docker image prune -f; else bash -lc \"\$COMPOSE_CMD -f docker-compose.ec2.yml up -d --build\"; docker image prune -f; fi"

      - name: Cleanup temporary key
        if: always()
        run: rm -f ~/.ssh/ec2_key
