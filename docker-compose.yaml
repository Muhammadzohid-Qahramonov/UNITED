services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: united
      POSTGRES_PASSWORD: "4pgsWQKLqgOUGOOalk1KmQsqOvgwngj6"
    volumes:
      - united_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "b-MSzANUZeggZXIZOEn6ZWO1OzmA79mb"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: united_test
      POSTGRES_PASSWORD: "yiaclduOCFWXxMUzEOxV7xeSNto3v062"
    volumes:
      - united_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "he-kOG1_ozmX4sp9LBcbXCSG8tlK6gcx"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  united_data:
  united_test_data:
